<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a12">
  <title>TrackStars - Collaborative DAW</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Auth Modal -->
  <div id="auth-modal" class="modal">
    <div class="modal-content">
      <h2>⭐ TRACKSTARS</h2>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>
      <form id="login-form" class="auth-form active">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div id="login-error" class="error-message"></div>
      </form>
      <form id="register-form" class="auth-form">
        <input type="text" id="reg-username" placeholder="Username" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Password (min 6 chars)" required>
        <input type="password" id="reg-confirm" placeholder="Confirm Password" required>
        <button type="submit">Register</button>
        <div id="register-error" class="error-message"></div>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app">
    <div class="header">
      <div class="logo">⭐ TRACKSTARS</div>
      <div class="user-info">
        <img id="header-avatar" class="header-avatar" src="" alt="">
        <span class="username" id="current-user"></span>
        <button class="logout-btn" id="logout-btn">Logout</button>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <button class="nav-item active" data-view="library"><span>🎵</span><span>Library</span></button>
      <button class="nav-item" data-view="studio"><span>🎛️</span><span>Studio</span></button>
      <button class="nav-item" data-view="social"><span>💬</span><span>Chat</span></button>
      <button class="nav-item" data-view="profile"><span>👤</span><span>Profile</span></button>
    </div>

    <!-- Library View -->
    <div id="library-view" class="view active">
      <div class="section-header">
        <h3>📚 Song Library</h3>
        <button class="create-btn" id="open-create-modal">+ New Track</button>
      </div>
      <input type="text" id="library-search" class="search-input" placeholder="🔍 Search songs or artists...">
      <div class="song-grid" id="song-list"><div class="loading">Loading tracks...</div></div>
    </div>

    <!-- Studio View -->
    <div id="studio-view" class="view">
      <div class="studio-header">
        <div><h2 id="current-song-title">Select a track</h2><p id="song-creator"></p></div>
        <button class="back-btn" id="back-btn">← Back</button>
      </div>
      <div class="transport">
        <button class="play-btn" id="play-btn">▶ Play</button>
        <button class="stop-btn" id="stop-btn">⏹️ Stop</button>
        <div class="bpm-control"><span>BPM:</span><input type="number" id="bpm-input" value="120" min="40" max="300"></div>
      </div>
      <div class="position-display" id="position-display">00:00:00</div>
      <div id="track-mixer"><div class="loading">Select a track to start</div></div>
      <div class="recording-panel">
        <div class="recording-controls">
          <button class="record-btn" id="record-btn">🎙️ Start Recording</button>
          <button class="record-btn" id="stop-record-btn" style="display:none">⏹️ Stop</button>
          <button class="upload-btn" id="upload-btn">📁 Upload</button>
          <input type="file" id="audio-file" accept="audio/*" style="display:none">
        </div>
        <div class="recording-settings">
          <label class="toggle"><input type="checkbox" id="metronome-toggle" checked><span>🎵 Metronome</span></label>
          <label class="toggle"><input type="checkbox" id="countin-toggle" checked><span>⏱️ Count-In (3 sec)</span></label>
        </div>
        <div id="countin-display" class="countin" style="display:none"><span id="countin-number">3</span><div class="progress"><div id="countin-bar"></div></div></div>
        <div id="recording-status" class="status"></div>
      </div>
    </div>

    <!-- Social/Chat View -->
    <div id="social-view" class="view">
      <div class="chat-container">
        <div class="chat-header"><h3>💬 Messages</h3></div>
        <div class="chat-users" id="chat-users"><div class="loading">Loading users...</div></div>
        <div class="chat-conversation" id="chat-conversation" style="display:none">
          <div class="conv-header"><button id="back-to-users">← Back</button><span id="chat-with"></span></div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input"><input type="text" id="chat-input" placeholder="Type a message..."><button id="send-chat">Send</button></div>
        </div>
      </div>
    </div>

    <!-- Profile View -->
    <div id="profile-view" class="view">
      <div id="profile-content"><div class="loading">Loading profile...</div></div>
    </div>

    <!-- Modals -->
    <div id="create-modal" class="modal-overlay"><div class="modal-card"><h3>Create New Track</h3><input type="text" id="new-title" placeholder="Track Title"><input type="number" id="new-bpm" value="120" min="40" max="300"><select id="new-genre"><option>Electronic</option><option>Hip Hop</option><option>Rock</option><option>Pop</option><option>Jazz</option><option>Ambient</option></select><div class="thumb-preview"><img id="thumb-preview"><button id="random-thumb">🎨 Randomize</button></div><div class="modal-buttons"><button id="confirm-create">Create</button><button id="cancel-create">Cancel</button></div></div></div>
    
    <div id="profile-modal" class="modal-overlay"><div class="modal-card"><div class="modal-header"><h3>Edit Profile</h3><button class="close-modal">&times;</button></div><div class="avatar-section"><img id="edit-avatar"><button id="change-avatar">Change Avatar</button><input type="file" id="avatar-file" accept="image/*" style="display:none"></div><textarea id="edit-bio" rows="3" placeholder="Tell us about yourself..."></textarea><div class="stats-row"><div><span id="edit-followers">0</span><label>Followers</label></div><div><span id="edit-following">0</span><label>Following</label></div><div><span id="edit-tracks">0</span><label>Tracks</label></div></div><button id="save-profile">Save Changes</button></div></div>
    
    <div id="user-modal" class="modal-overlay"><div class="modal-card"><div class="modal-header"><button class="close-user-modal">&times;</button></div><div id="user-modal-content"></div></div></div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
