<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>TrackStars - Collaborative DAW</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Auth Modal -->
  <div id="auth-modal" class="modal">
    <div class="modal-content">
      <h2>⭐ TRACKSTARS</h2>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>
      <form id="login-form" class="auth-form active">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div id="login-error" class="error-message"></div>
      </form>
      <form id="register-form" class="auth-form">
        <input type="text" id="reg-username" placeholder="Username" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Password (min 6 chars)" required>
        <input type="password" id="reg-confirm" placeholder="Confirm Password" required>
        <button type="submit">Register</button>
        <div id="register-error" class="error-message"></div>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app">
    <div class="header">
      <div class="logo">⭐ TRACKSTARS</div>
      <div class="user-info">
        <img id="header-avatar" class="header-avatar" src="" alt="">
        <span class="username" id="current-user"></span>
        <button class="logout-btn" id="logout-btn">Logout</button>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <button class="nav-item active" data-view="library">
        <span>🎵</span>
        <span>Library</span>
      </button>
      <button class="nav-item" data-view="studio">
        <span>🎛️</span>
        <span>Studio</span>
      </button>
      <button class="nav-item" data-view="social">
        <span>💬</span>
        <span>Social</span>
      </button>
      <button class="nav-item" data-view="profile">
        <span>👤</span>
        <span>Profile</span>
      </button>
    </div>

    <!-- Library View -->
    <div id="library-view" class="view active">
      <div class="feed-header">
        <h3>📚 Song Library</h3>
        <button class="create-btn" id="open-create-modal">+ Create New Track</button>
      </div>
      <div class="search-bar-container">
        <input type="text" id="library-search" class="search-input-small" placeholder="🔍 Search songs...">
      </div>
      <div class="song-grid" id="song-list">
        <div class="loading">Loading tracks...</div>
      </div>
    </div>

    <!-- Studio View -->
    <div id="studio-view" class="view">
      <div id="daw-area">
        <div class="daw-header">
          <div class="song-info">
            <h2 id="current-song-title">Select a track</h2>
            <p id="song-creator"></p>
          </div>
          <button class="back-btn" id="back-btn">← Back to Library</button>
        </div>

        <div class="transport">
          <button class="play-btn" id="play-btn">▶ Play</button>
          <button class="stop-btn" id="stop-btn">⏹️ Stop</button>
          <div class="bpm-control">
            <span>BPM:</span>
            <input type="number" id="bpm-input" value="120" min="40" max="300" step="1">
          </div>
        </div>
        <div class="position-display" id="position-display">00:00:00</div>

        <div id="track-mixer">
          <div class="loading">Select a track to start</div>
        </div>

        <div class="recording-section">
          <div class="recording-controls">
            <button class="record-btn" id="record-btn">🎙️ Start Recording</button>
            <button class="record-btn" id="stop-record-btn" style="display: none;">⏹️ Stop Recording</button>
            <input type="file" id="audio-file" accept="audio/*" style="display: none;">
            <button class="upload-btn" id="upload-btn">📁 Upload Audio</button>
          </div>
          
          <div class="recording-settings">
            <div class="setting-item">
              <label class="switch">
                <input type="checkbox" id="metronome-toggle" checked>
                <span class="slider round"></span>
              </label>
              <span class="setting-label">🎵 Metronome</span>
            </div>
            <div class="setting-item">
              <label class="switch">
                <input type="checkbox" id="countin-toggle" checked>
                <span class="slider round"></span>
              </label>
              <span class="setting-label">⏱️ 3-Second Count-In</span>
            </div>
          </div>
          
          <div id="countin-display" class="countin-display" style="display: none;">
            <span id="countin-number" class="countin-number">3</span>
            <div class="countin-progress">
              <div id="countin-progress-bar" class="countin-progress-bar"></div>
            </div>
            <div class="countin-beat-indicator" id="countin-beat"></div>
          </div>
          
          <div id="recording-status" class="recording-status"></div>
          <div class="metronome-hint">🎵 Toggle metronome for perfect timing during recording</div>
        </div>
      </div>
    </div>

    <!-- Social View (Chat) -->
    <div id="social-view" class="view">
      <div class="chat-container">
        <div class="chat-header">
          <h3>💬 Messages</h3>
        </div>
        <div class="chat-users-list" id="chat-users-list">
          <div class="loading">Loading users...</div>
        </div>
        <div class="chat-conversation" id="chat-conversation" style="display: none;">
          <div class="chat-conversation-header">
            <button class="back-to-users" id="back-to-users">← Back</button>
            <span id="chat-with-user"></span>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-area">
            <input type="text" id="chat-message-input" placeholder="Type a message..." class="chat-input">
            <button class="send-chat-btn" id="send-chat-btn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Profile View -->
    <div id="profile-view" class="view">
      <div id="profile-content">
        <div class="loading">Loading profile...</div>
      </div>
    </div>

    <!-- Create Modal -->
    <div id="create-modal" class="create-modal">
      <div class="create-modal-content">
        <h3>Create New Track</h3>
        <input type="text" id="new-song-title" placeholder="Track Title" required>
        <div>
          <label>BPM:</label>
          <input type="number" id="new-song-bpm" value="120" min="40" max="300">
        </div>
        <select id="new-song-genre">
          <option value="Electronic">Electronic</option>
          <option value="Hip Hop">Hip Hop</option>
          <option value="Rock">Rock</option>
          <option value="Pop">Pop</option>
          <option value="Jazz">Jazz</option>
          <option value="Ambient">Ambient</option>
        </select>
        <div class="thumbnail-preview">
          <img id="preview-thumb" src="" alt="Thumbnail preview">
          <button class="randomize-thumb-btn" id="randomize-thumb-btn">🎨 Randomize Thumbnail</button>
        </div>
        <div class="modal-buttons">
          <button class="confirm-btn" id="confirm-create">Create</button>
          <button class="cancel-btn" id="cancel-create">Cancel</button>
        </div>
      </div>
    </div>

    <!-- User Profile Modal -->
    <div id="user-profile-modal" class="user-profile-modal">
      <div class="user-profile-content">
        <div class="user-profile-header">
          <button class="close-user-profile">&times;</button>
        </div>
        <div id="user-profile-details"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
